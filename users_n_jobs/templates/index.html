{% extends "base.html" %}
{% block content %}
<h1>Записи в блоге</h1>
{% for item in news %}
<div class="col-md-6 border rounded mb-3 p-2">
    <h2>{{item.title}}</h2>
    <div>{{item.content}}</div>
    <div>
        Автор - {{item.user.name}}, Дата написания - {{item.created_date}}
    </div>
</div>
{% endfor %}
{% endblock %}
